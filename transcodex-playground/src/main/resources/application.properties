# Spring Boot Application Properties

# Max File Upload size limits (Default is 10MB)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# Location where Tomcat writes temporary uploaded multipart chunks (defaults to system temp dir)
spring.servlet.multipart.location=D:/Code/Projects/transcodex-sdk/transcodex-playground/temp

# TranscodeX Persistent Output Storage
transcodex.storage.dir=D:/Code/Projects/transcodex-sdk/transcodex-playground/output

# FFmpeg encoding threads per job (0 = auto-detect CPU cores)
transcodex.encoding.threads=4
