name: Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build, Format Check & Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install FFmpeg & FFprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Verify Formatting (Spotless)
        run: mvn spotless:check

      - name: Compile Code
        run: mvn clean compile

      - name: Run Tests
        run: mvn test

      - name: Verify Package Construction
        run: mvn package -DskipTests
