name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, Validate and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install FFmpeg & FFprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build & Run All Tests
        run: mvn clean package

      - name: Execute Benchmark Smoke Test
        run: |
          java -jar transcodex-benchmarks/target/benchmarks.jar -f 1 -wi 1 -i 1 -r 1s -w 1s -rf json -rff benchmarks-report.json

      - name: Locate and Collect Artifact Jars
        run: |
          mkdir release-artifacts
          cp transcodex-api/target/transcodex-api-*.jar release-artifacts/
          cp transcodex-core/target/transcodex-core-*.jar release-artifacts/
          cp transcodex-ffmpeg/target/transcodex-ffmpeg-*.jar release-artifacts/
          cp transcodex-storage/target/transcodex-storage-*.jar release-artifacts/
          cp transcodex-benchmarks/target/benchmarks.jar release-artifacts/transcodex-benchmarks.jar
          cp benchmarks-report.json release-artifacts/

      - name: Generate Release Notes & Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.jar
            release-artifacts/benchmarks-report.json
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
