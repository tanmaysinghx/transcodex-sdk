name: Benchmark Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at midnight

jobs:
  benchmark:
    name: Run JMH Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install FFmpeg & FFprobe
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build Benchmarks
        run: mvn clean package -DskipTests

      - name: Run JMH Suite
        run: |
          java -jar transcodex-benchmarks/target/benchmarks.jar -f 1 -wi 2 -i 5 -r 2s -w 2s -rf json -rff benchmarks-result.json

      - name: Store & Compare Benchmark Results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: JMH Benchmarks
          tool: 'jmh'
          output-file-path: benchmarks-result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
